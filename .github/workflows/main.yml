name: 🐻 Собрать APK — АРТ Ярославль

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Скачать код
        uses: actions/checkout@v4

      - name: ☕ Установить Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Исправить окончания строк в gradlew
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: 📦 Скачать gradle-wrapper.jar (если отсутствует)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -sL "https://github.com/gradle/gradle/raw/v8.9/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: 🏗️ Собрать Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 📲 Загрузить APK
        uses: actions/upload-artifact@v4
        with:
          name: art-yaroslavl-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
